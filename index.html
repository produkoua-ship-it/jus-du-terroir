<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jus du Terroir | Elite Dashboard</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json?v=1.0.3">
    <meta name="theme-color" content="#C8265A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Terroir">
    <link rel="icon" type="image/png" href="img/icon-192.png?v=1.0.3">
    <link rel="apple-touch-icon" href="img/icon-192.png?v=1.0.3">

    <!-- Local Tailwind CSS -->
    <link rel="stylesheet" href="css/tailwind.css">
    <style>
        .custom-shadow {
            box-shadow: 0 20px 50px rgba(36, 15, 46, 0.08);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .active-tab i,
        .active-tab svg {
            color: #C8265A !important;
            stroke-width: 3px;
        }

        .lg-active-bar {
            display: none;
        }

        .active-tab .lg-active-bar {
            display: block;
        }

        @media (min-width: 1024px) {
            .active-tab {
                transform: none !important;
                color: white !important;
            }

            .active-tab .w-10 {
                background-color: #C8265A !important;
                box-shadow: 0 0 20px rgba(200, 38, 90, 0.4);
            }
        }

        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(36, 15, 46, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 16px 24px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.5s ease-in 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .toast-success {
            border-left: 6px solid #6CA742;
        }

        .toast-error {
            border-left: 6px solid #C8265A;
        }

        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-50px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.25s ease-out;
        }

        .fade-in {
            opacity: 1;
            transition: opacity 0.25s ease-in;
        }

        /* DARK MODE SYSTEM */
        .dark-mode {
            --terroir-bg: #0F0912;
            --card-bg: #1A111F;
            --text-main: #FFFFFF;
            --text-muted: #A091A8;
            --border-color: rgba(255, 255, 255, 0.08);
            background-color: var(--terroir-bg) !important;
            color: var(--text-main) !important;
        }

        .dark-mode body {
            background-color: var(--terroir-bg) !important;
            color: var(--text-main) !important;
        }

        .dark-mode .bg-white {
            background-color: var(--card-bg) !important;
            color: var(--text-main) !important;
        }

        .dark-mode .bg-gray-50 {
            background-color: rgba(255, 255, 255, 0.04) !important;
            color: var(--text-main) !important;
        }

        .dark-mode h1,
        .dark-mode h2,
        .dark-mode h3,
        .dark-mode h4,
        .dark-mode p,
        .dark-mode span,
        .dark-mode label {
            color: var(--text-main) !important;
        }

        .dark-mode .text-terroir-secondary,
        .dark-mode .text-gray-900,
        .dark-mode .text-gray-700 {
            color: var(--text-main) !important;
        }

        .dark-mode .text-gray-400,
        .dark-mode .text-gray-500,
        .dark-mode .text-white/50 {
            color: var(--text-muted) !important;
        }

        .dark-mode .border-gray-50,
        .dark-mode .border-gray-100,
        .dark-mode .border-white/10 {
            border-color: var(--border-color) !important;
        }

        .dark-mode header,
        .dark-mode nav,
        .dark-mode aside {
            background-color: var(--card-bg) !important;
            border-color: var(--border-color) !important;
        }

        .dark-mode input,
        .dark-mode select {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: white !important;
            border: 1px solid var(--border-color) !important;
        }

        .dark-mode .shadow-sm,
        .dark-mode .shadow-md {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important;
        }

        #quick-action-overlay {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            background: linear-gradient(135deg, rgba(200, 38, 90, 0.85), rgba(36, 15, 46, 0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #quick-action-overlay.active {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        #quick-action-overlay .action-btn {
            transform: translateY(60px) scale(0.8) rotate(-5deg);
            opacity: 0;
            filter: blur(4px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #quick-action-overlay.active .action-btn {
            transform: translateY(0) scale(1) rotate(0deg);
            opacity: 1;
            filter: blur(0px);
        }

        #quick-action-overlay.active .action-btn:nth-child(1) { transition-delay: 0.05s; }
        #quick-action-overlay.active .action-btn:nth-child(2) { transition-delay: 0.12s; }
        #quick-action-overlay.active .action-btn:nth-child(3) { transition-delay: 0.19s; }
        #quick-action-overlay.active .action-btn:nth-child(4) { transition-delay: 0.26s; }

        /* SPLASH SCREEN */
        @keyframes custom-ping {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.4;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .animate-custom-ping {
            animation: custom-ping 2s infinite ease-in-out;
        }

        @keyframes wave-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(200, 38, 90, 0.2), 0 0 40px rgba(243, 156, 18, 0.1);
            }

            50% {
                box-shadow: 0 0 40px rgba(200, 38, 90, 0.4), 0 0 60px rgba(243, 156, 18, 0.3);
            }
        }

        .animate-wave-glow {
            animation: wave-glow 3s infinite ease-in-out;
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-terroir-bg font-sans text-terroir-secondary lg:flex lg:items-start overflow-x-hidden">

    <!-- SPLASH SCREEN OVERLAY -->
    <div id="splash-screen"
        class="fixed inset-0 z-[200] bg-terroir-secondary flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative flex flex-col items-center">
            <!-- Logo with custom glow and ping -->
            <div class="relative mb-8">
                <div
                    class="absolute inset-0 rounded-3xl animate-custom-ping bg-gradient-to-tr from-terroir-primary to-terroir-accent opacity-50 blur-xl">
                </div>
                <img src="img/logo.jpg"
                    class="w-28 h-28 rounded-3xl shadow-2xl border-2 border-white/10 relative z-10 animate-wave-glow object-cover">
            </div>

            <!-- App Name -->
            <h1 class="text-white text-3xl font-black mb-2 tracking-tight">Jus du Terroir</h1>
            <p class="text-terroir-accent text-[10px] uppercase tracking-[0.4em] font-black">L'excellence au service du
                goût</p>

            <!-- Minimal Loader -->
            <div class="mt-12 flex gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-terroir-primary animate-bounce" style="animation-delay: 0.1s">
                </div>
                <div class="w-2.5 h-2.5 rounded-full bg-terroir-accent animate-bounce" style="animation-delay: 0.2s">
                </div>
                <div class="w-2.5 h-2.5 rounded-full bg-terroir-success animate-bounce" style="animation-delay: 0.3s">
                </div>
            </div>
        </div>
    </div>

    <!-- LOCK SCREEN OVERLAY -->
    <div id="lock-screen"
        class="fixed inset-0 z-[100] bg-terroir-secondary flex flex-col items-center justify-center p-8 hidden">
        <div class="mb-12 text-center animate-pop">
            <img src="img/logo.jpg"
                class="w-20 h-20 rounded-2xl mx-auto mb-6 shadow-2xl border-2 border-terroir-primary/20">
            <h2 class="text-white text-xl font-black">Accès Sécurisé</h2>
            <p class="text-white/40 text-[10px] mt-2 uppercase tracking-[0.3em] font-black">Entrez votre code PIN</p>
        </div>

        <div id="pin-display" class="flex gap-4 mb-12">
            <div class="w-4 h-4 rounded-full border-2 border-white/20"></div>
            <div class="w-4 h-4 rounded-full border-2 border-white/20"></div>
            <div class="w-4 h-4 rounded-full border-2 border-white/20"></div>
            <div class="w-4 h-4 rounded-full border-2 border-white/20"></div>
        </div>

        <div class="grid grid-cols-3 gap-6 w-full max-w-[280px]">
            <button onclick="window.enterPin('1')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">1</button>
            <button onclick="window.enterPin('2')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">2</button>
            <button onclick="window.enterPin('3')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">3</button>
            <button onclick="window.enterPin('4')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">4</button>
            <button onclick="window.enterPin('5')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">5</button>
            <button onclick="window.enterPin('6')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">6</button>
            <button onclick="window.enterPin('7')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">7</button>
            <button onclick="window.enterPin('8')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">8</button>
            <button onclick="window.enterPin('9')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">9</button>
            <button onclick="window.clearPin()"
                class="w-16 h-16 rounded-full text-white/40 text-[10px] font-black uppercase tracking-widest active:scale-90 transition-all">Effacer</button>
            <button onclick="window.enterPin('0')"
                class="w-16 h-16 rounded-full bg-white/5 text-white text-2xl font-bold hover:bg-white/10 active:scale-90 transition-all border border-white/5">0</button>
            <button id="biometric-btn" onclick="window.authenticateBiometric()"
                class="w-16 h-16 rounded-full bg-white/5 text-terroir-accent flex items-center justify-center hover:bg-white/10 active:scale-90 transition-all border border-white/5 hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12a10 10 0 0 1 13-9.54" />
                    <path d="M7 19a10 10 0 0 0 15-7" />
                    <path d="M12 12a5 5 0 0 0-5 5" />
                    <path d="M11 7a5 5 0 0 0-5 5" />
                    <path d="M13 18a5 5 0 0 0 5-5" />
                    <path d="M12 11a5 5 0 0 1 5 5" />
                </svg>
            </button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- DESKTOP SIDEBAR -->
    <aside
        class="hidden lg:flex w-80 h-screen sticky top-0 bg-terroir-secondary flex-col p-10 text-white z-50 shadow-2xl border-r border-white/5">
        <div class="flex items-center gap-4 mb-16">
            <button onclick="location.reload()" class="active:scale-95 transition-transform">
                <img src="img/logo.jpg"
                    class="w-14 h-14 rounded-2xl border-2 border-white/10 object-cover cursor-pointer" alt="Logo">
            </button>
            <div>
                <p class="text-[10px] text-white/30 font-black uppercase tracking-widest">Dashboard Pro</p>
                <h2 class="font-black text-xl mb-2">Jus du Terroir</h2>
                <div
                    class="network-badge flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 w-fit no-print">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span>En ligne</span>
                </div>
            </div>
        </div>

        <nav class="flex flex-col gap-6 flex-1">
            <button onclick="window.toggleActionMenu()"
                class="mb-6 w-full bg-gradient-to-tr from-terroir-primary to-pink-600 text-white rounded-2xl p-4 flex items-center justify-center gap-3 shadow-lg shadow-terroir-primary/30 active:scale-95 transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                    class="group-hover:rotate-90 transition-transform duration-300">
                    <path d="M12 5v14" />
                    <path d="M5 12h14" />
                </svg>
                <span class="font-black text-xs uppercase tracking-widest">Nouvelle Action</span>
            </button>

            <button onclick="window.renderView('dashboard')" data-view="dashboard"
                class="nav-link flex items-center gap-4 text-gray-400 hover:text-white transition-all group p-2">
                <div
                    class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-terroir-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="7" x="3" y="3" rx="1" />
                        <rect width="7" height="7" x="14" y="3" rx="1" />
                        <rect width="7" height="7" x="14" y="14" rx="1" />
                        <rect width="7" height="7" x="3" y="14" rx="1" />
                    </svg>
                </div>
                <span class="font-bold text-sm uppercase tracking-widest">Accueil</span>
            </button>
            <button onclick="window.renderView('inventory')" data-view="inventory"
                class="nav-link flex items-center gap-4 text-gray-400 hover:text-white transition-all group p-2">
                <div
                    class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-terroir-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M16.3 3.3c.6-.6 1.5-.6 2.1 0l2.3 2.3c.6.6.6 1.5 0 2.1L12.3 16.1l-4.1 1.4 1.4-4.1 8.4-8.4Z" />
                        <path d="m15 5 3 3" />
                        <path d="M9 17v1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1" />
                    </svg>
                </div>
                <span class="font-bold text-sm uppercase tracking-widest">Stock</span>
            </button>
            <button onclick="window.renderView('expenses')" data-view="expenses"
                class="nav-link flex items-center gap-4 text-gray-400 hover:text-white transition-all group p-2">
                <div
                    class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-terroir-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="14" x="2" y="5" rx="2" />
                        <line x1="2" x2="22" y1="10" y2="10" />
                    </svg>
                </div>
                <span class="font-bold text-sm uppercase tracking-widest">Dépenses</span>
            </button>
            <button onclick="window.renderView('reports')" data-view="reports"
                class="nav-link flex items-center gap-4 text-gray-400 hover:text-white transition-all group p-2">
                <div
                    class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-terroir-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="m19 9-5 5-4-4-3 3" />
                    </svg>
                </div>
                <span class="font-bold text-sm uppercase tracking-widest">Bilan</span>
            </button>
        </nav>

        <div class="mt-auto pt-10 border-t border-white/5">
            <button onclick="renderView('settings')"
                class="flex items-center gap-4 text-white/50 hover:text-white transition-colors group">
                <div
                    class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:rotate-45 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2l-.31.31a2 2 0 0 0 0 2.83l.31.31a2 2 0 0 1 0 2.83l-.31.31a2 2 0 0 0 0 2.83l.31.31a2 2 0 0 0 2.83 0l.31-.31a2 2 0 0 1 2.83 0l.31.31a2 2 0 0 0 2.83 0l.31-.31a2 2 0 0 1 0-2.83l.31-.31a2 2 0 0 0 0-2.83l-.31-.31a2 2 0 0 1 0-2.83l.31-.31a2 2 0 0 0 0-2.83l-.31-.31a2 2 0 0 0-2.83 0l-.31.31a2 2 0 0 1-2.83 0l-.31-.31a2 2 0 0 0-2.83 0l-.31.31a2 2 0 0 1 0 2.83l.31.31a2 2 0 0 0 0 2.83l-.31.31a2 2 0 0 1 0 2.83l.31.31a2 2 0 0 0 0 2.83l.31.31a2 2 0 0 0 2.83 0l.31-.31a2 2 0 0 1 2.83 0l.31.31a2 2 0 0 0 2.83 0l.31-.31a2 2 0 0 1 0-2.83l.31-.31a2 2 0 0 0 0-2.83l-.31-.31a2 2 0 0 1 0-2.83l.31-.31a2 2 0 0 0 0-2.83l-.31-.31a2 2 0 0 0-2.83 0l-.31.31a2 2 0 0 1-2.83 0l-.31-.31a2 2 0 0 0-2.83 0Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </div>
                <span class="font-bold text-xs uppercase tracking-widest">Paramètres</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 w-full lg:max-h-screen lg:overflow-y-auto">
        <!-- TOP HEADER (Mobile) -->
        <header
            class="lg:hidden flex justify-between items-center px-6 pt-8 pb-6 bg-white rounded-b-3xl shadow-sm sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="relative active:scale-95 transition-transform">
                    <img src="img/logo.jpg"
                        class="w-12 h-12 rounded-2xl shadow-md border-2 border-white object-cover cursor-pointer"
                        alt="Logo">
                    <span
                        class="absolute -bottom-1 -right-1 w-4 h-4 bg-terroir-success border-2 border-white rounded-full"></span>
                </button>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="font-bold text-lg">Jus du Terroir</h1>
                        <div
                            class="network-badge flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 no-print">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span>En ligne</span>
                        </div>
                    </div>
                    <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">Dashboard Elite</p>
                </div>
            </div>
            <button onclick="renderView('settings')"
                class="w-11 h-11 flex items-center justify-center rounded-2xl bg-gray-50 border border-gray-100 relative group active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"

    <script>
        // Service Worker Registration for PWA - avec retry
        if ('serviceWorker' in navigator) {
            function registerSW() {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker: Registered successfully');
                        // Vérifier les mises à jour
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Service Worker: Update available');
                                }
                            });
                        });
                    })
                    .catch(err => {
                        console.log('Service Worker: Registration failed, retrying...', err);
                        // Réessayer après 5 secondes
                        setTimeout(registerSW, 5000);
                    });
            }
            window.addEventListener('load', registerSW);
        }

        // PWA & Icons Initializer
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                try { lucide.createIcons(); } catch (e) { console.warn('Lucide icons init failed:', e); }
            }
        });

        // Détection offline pour mise à jour du statut
        window.addEventListener('online', () => {
            console.log('[App] Connection restored');
        });
        window.addEventListener('offline', () => {
            console.log('[App] Connection lost - operating in offline mode');
        });
    </script>
